name: Build, Release, and Distribute

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "::error::GOOGLE_SERVICES_JSON secret is not set."
            exit 1
          fi
          echo "$GOOGLE_SERVICES_JSON" > app/google-services.json

      - name: Build all modules (assembleDebug)
        env:
          ANDROID_CLIENT_ID: ${{ secrets.ANDROID_CLIENT_ID }}
        run: ./gradlew assembleDebug --stacktrace

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Generate Version and Changelog
        id: conventional_release
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch

      - name: Rename APK
        if: steps.conventional_release.outputs.new_tag != ''
        run: mv app/build/outputs/apk/debug/app-debug.apk "app/build/outputs/apk/debug/ProfessionalSleeper-${{ steps.conventional_release.outputs.new_tag }}.apk"

      - name: Create GitHub Release
        if: steps.conventional_release.outputs.new_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.conventional_release.outputs.new_tag }}
          name: "Release ${{ steps.conventional_release.outputs.new_tag }}"
          body: ${{ steps.conventional_release.outputs.changelog }}
          files: "app/build/outputs/apk/debug/ProfessionalSleeper-${{ steps.conventional_release.outputs.new_tag }}.apk"

      - name: Upload to Firebase App Distribution
        if: steps.conventional_release.outputs.new_tag != ''
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_CREDENTIALS }}
          groups: qa-testers
          file: "app/build/outputs/apk/debug/ProfessionalSleeper-${{ steps.conventional_release.outputs.new_tag }}.apk"
          releaseNotes: ${{ steps.conventional_release.outputs.changelog }}